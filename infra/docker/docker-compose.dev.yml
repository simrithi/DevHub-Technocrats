version: "3.9"
services:
  backend:
    build: ../../backend
    volumes: ["../../backend:/app"]
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    env_file: ../../backend/.env
    depends_on: [postgres, redis]

  frontend:
    build: ../../frontend
    volumes: ["../../frontend:/app", "/app/node_modules"]
    command: npm run dev
    ports: ["3000:3000"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hyperadar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]
