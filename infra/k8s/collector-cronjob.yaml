apiVersion: batch/v1
kind: CronJob
metadata:
  name: collector
  namespace: hyperadar
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: collector
              image: hyperadar-backend:latest
              command: ["python", "-m", "collectors.scheduler"]
          restartPolicy: OnFailure
